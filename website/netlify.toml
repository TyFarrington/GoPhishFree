# =============================================================================
# @file netlify.toml
# @description Netlify deployment configuration for the GoPhishFree landing page.
#              Specifies the build command, the publish directory for the compiled
#              output, and a catch-all redirect rule that enables client-side (SPA)
#              routing by forwarding all paths to index.html.
#
# @programmers Ty Farrington, Andrew Reyes, Brett Suhr, Nicholas Holmes, Kaleb Howard
# @dateCreated 2026-02-14
# @dateRevised 2026-02-14 - Sprint 2: Initial website creation with comprehensive documentation (All programmers)
#
# @preconditions The project must contain a valid package.json with a "build" script.
#                Netlify CLI or Netlify CI must be configured to deploy this repository.
# @postconditions The site is built into the dist/ directory and served with SPA routing.
# @errorConditions If "npm run build" fails, the Netlify deploy will be marked as failed.
# @sideEffects None (configuration only).
# @invariants The publish directory is always "dist" (Vite's default output).
# @knownFaults None.
# =============================================================================

# ---- Build Settings ----
[build]
  command = "npm run build"
  publish = "dist"

# ---- Canonical domain redirect ----
# Force all traffic to the bare domain (no www). If you use www as primary,
# swap these — but pick ONE canonical form and stick to it for SEO.
[[redirects]]
  from = "https://www.gophishfree.com/*"
  to   = "https://gophishfree.com/:splat"
  status = 301
  force  = true

# ---- SPA Redirect Rule ----
# All unmatched routes are rewritten to index.html so React Router handles routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---- Security & SEO Headers ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    # Tells Google and crawlers this is the real canonical site
    X-Robots-Tag           = "index, follow"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
