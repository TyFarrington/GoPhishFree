<!doctype html>
<html lang="en">
  <head>
    <!-- ===== Character Set & Viewport ===== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== Primary SEO ===== -->
    <title>GoPhishFree — AI-Powered Phishing Detection for Gmail | Free Chrome Extension</title>
    <meta name="description" content="GoPhishFree is a free, open-source Chrome extension that detects phishing emails in Gmail using local machine learning. 97%+ accuracy. No data ever leaves your device. Built by University of Kansas students." />
    <meta name="keywords" content="phishing detection, Gmail security, Chrome extension, machine learning, email security, anti-phishing, free, open source, University of Kansas" />
    <meta name="author" content="Ty Farrington, Andrew Reyes, Brett Suhr, Nicholas Holmes, Kaleb Howard" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://gophishfree.com/" />

    <!-- ===== Open Graph (Facebook, LinkedIn, Discord previews) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gophishfree.com/" />
    <meta property="og:title" content="GoPhishFree — AI-Powered Phishing Detection for Gmail" />
    <meta property="og:description" content="Free Chrome extension that detects phishing emails in Gmail using local machine learning. 97%+ accuracy. No data ever leaves your device." />
    <meta property="og:image" content="https://gophishfree.com/og-image.png" />
    <meta property="og:site_name" content="GoPhishFree" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter / X Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://gophishfree.com/" />
    <meta name="twitter:title" content="GoPhishFree — AI-Powered Phishing Detection for Gmail" />
    <meta name="twitter:description" content="Free Chrome extension. Local ML model, 97%+ accuracy, zero data sent anywhere. Built by U of M students." />
    <meta name="twitter:image" content="https://gophishfree.com/og-image.png" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logomini.png" />

    <!-- ===== Schema.org Structured Data — SoftwareApplication + Team ===== -->
    <!--
      This JSON-LD block tells Google:
        1. What the software is (SoftwareApplication)
        2. Who built it (5 Person entities with names and URLs)
        3. The organization behind it (University of Kansas capstone)
      This is what generates Knowledge Panel entries and rich results in Google Search
      and associates developer names with this URL.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "@id": "https://gophishfree.com/#app",
          "name": "GoPhishFree",
          "alternateName": "GoPhishFree Chrome Extension",
          "description": "A free, open-source Chrome extension that detects phishing emails in Gmail using a locally-executed Random Forest machine learning model. All analysis runs on-device with no data ever leaving the browser.",
          "applicationCategory": "SecurityApplication",
          "applicationSubCategory": "Email Security",
          "operatingSystem": "Google Chrome",
          "url": "https://gophishfree.com",
          "downloadUrl": "https://chrome.google.com/webstore",
          "softwareVersion": "1.0.0",
          "releaseNotes": "Initial public release — University of Kansas EECS 582 capstone project",
          "license": "https://gophishfree.com/terms",
          "privacyPolicy": "https://gophishfree.com/privacy",
          "isAccessibleForFree": true,
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "author": [
            { "@id": "https://gophishfree.com/team#ty-farrington" },
            { "@id": "https://gophishfree.com/team#andrew-reyes" },
            { "@id": "https://gophishfree.com/team#brett-suhr" },
            { "@id": "https://gophishfree.com/team#nicholas-holmes" },
            { "@id": "https://gophishfree.com/team#kaleb-howard" }
          ],
          "creator": {
            "@type": "EducationalOrganization",
            "name": "University of Kansas — EECS 582 Capstone",
            "url": "https://eecs.ku.edu"
          }
        },
        {
          "@type": "Person",
          "@id": "https://gophishfree.com/team#ty-farrington",
          "name": "Ty Farrington",
          "jobTitle": "Lead Developer & ML Engineer",
          "description": "Project architecture, Random Forest ML pipeline, feature extraction engine, Chrome extension core, dataset curation, model training infrastructure.",
          "url": "https://gophishfree.com/team#ty-farrington",
          "worksFor": { "@type": "Project", "name": "GoPhishFree", "url": "https://gophishfree.com" }
        },
        {
          "@type": "Person",
          "@id": "https://gophishfree.com/team#andrew-reyes",
          "name": "Andrew Reyes",
          "jobTitle": "Extension & UI Developer",
          "description": "Fish Tank popup UI, content script UI components, Gmail DOM integration, deep scan UI, animation system.",
          "url": "https://gophishfree.com/team#andrew-reyes",
          "worksFor": { "@type": "Project", "name": "GoPhishFree", "url": "https://gophishfree.com" }
        },
        {
          "@type": "Person",
          "@id": "https://gophishfree.com/team#brett-suhr",
          "name": "Brett Suhr",
          "jobTitle": "Security & Backend Developer",
          "description": "Background service worker, AI provider integrations (BYOK), security hardening, DNS-over-HTTPS implementation, vulnerability auditing.",
          "url": "https://gophishfree.com/team#brett-suhr",
          "worksFor": { "@type": "Project", "name": "GoPhishFree", "url": "https://gophishfree.com" }
        },
        {
          "@type": "Person",
          "@id": "https://gophishfree.com/team#nicholas-holmes",
          "name": "Nicholas Holmes",
          "jobTitle": "Feature Engineering & QA",
          "description": "BEC detection logic, header analysis, attachment risk scoring, email feature vector design, testing and validation.",
          "url": "https://gophishfree.com/team#nicholas-holmes",
          "worksFor": { "@type": "Project", "name": "GoPhishFree", "url": "https://gophishfree.com" }
        },
        {
          "@type": "Person",
          "@id": "https://gophishfree.com/team#kaleb-howard",
          "name": "Kaleb Howard",
          "jobTitle": "Website & Documentation",
          "description": "Marketing website, documentation, sprint artifacts, Chrome Web Store submission materials, user-facing content.",
          "url": "https://gophishfree.com/team#kaleb-howard",
          "worksFor": { "@type": "Project", "name": "GoPhishFree", "url": "https://gophishfree.com" }
        },
        {
          "@type": "WebSite",
          "@id": "https://gophishfree.com/#website",
          "url": "https://gophishfree.com",
          "name": "GoPhishFree",
          "description": "Official website for the GoPhishFree Chrome extension — free AI-powered phishing detection for Gmail.",
          "publisher": { "@id": "https://gophishfree.com/#app" }
        }
      ]
    }
    </script>

    <!-- ===== Google Fonts ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
